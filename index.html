<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yuvan's study engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #dc2626; --gold: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 700px; }
        .card { background: var(--card); border-radius: 24px; width: 100%; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        textarea { width: 100%; height: 120px; border-radius: 12px; background: #0f172a; color: white; border: 1px solid #334155; padding: 12px; font-family: inherit; resize: none; margin-top: 10px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #334155; }
        
        .upload-zone { border: 2px dashed var(--gold); padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 15px; background: rgba(250, 204, 21, 0.05); cursor: pointer; }
        .upload-zone:hover { background: rgba(250, 204, 21, 0.1); }
        .upload-zone label { font-size: 11px; font-weight: 800; color: var(--gold); display: block; cursor: pointer; }

        button#main-btn { background: var(--gold); color: black; border: none; padding: 16px; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .output-section { display: none; width: 100%; }
        
        /* Exam Paper - White for Printing */
        .paper-content { white-space: pre-wrap; line-height: 1.8; font-size: 14px; background: #fff; color: #1e293b; padding: 40px; border-radius: 8px; border: 1px solid #e2e8f0; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        .paper-content b { color: #000; font-weight: 900; }
        
        /* Flashcards Grid */
        .fc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .flashcard { perspective: 1000px; height: 160px; cursor: pointer; }
        .fc-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .fc-inner { transform: rotateY(180deg); }
        .fc-front, .fc-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; border-radius: 18px; text-align: center; font-size: 13px; font-weight: 700; }
        .fc-front { background: var(--card); border: 2px solid var(--gold); color: var(--gold); }
        .fc-back { background: var(--gold); color: black; transform: rotateY(180deg); }
        
        .loader { display: none; text-align: center; margin-top: 15px; color: var(--gold); font-weight: 700; font-size: 12px; }
        .sec-header { color: var(--gold); text-transform: uppercase; font-size: 14px; margin: 30px 0 10px 0; border-left: 4px solid var(--gold); padding-left: 10px; font-weight: 900; }
        
        @media print {
            body { background: white; padding: 0; }
            .container, .card, header, .sec-header:not(:last-of-type), #fcGrid { display: none; }
            .output-section, #paperList { display: block; width: 100%; }
            .paper-content { border: none; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 20px;">
            <h1 style="margin: 0; color: var(--gold); font-weight: 900; letter-spacing: -2px;">STUDY ENGINE AI</h1>
            <span style="font-size: 10px; font-weight: 700; opacity: 0.6;">PDF • IMAGE • DOC • TEXT</span>
        </header>

        <div class="card">
            <input type="text" id="topic" placeholder="Chapter Name (e.g., Photosynthesis)">
            
            <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
                <label>UPLOAD PDF, WORD, OR TAKE A PHOTO</label>
                <input type="file" id="fileInput" accept="image/*, .pdf, .doc, .docx" style="display: none;" onchange="updateFileName()">
                <div id="fileName" style="font-size: 10px; margin-top: 8px; color: white; opacity: 0.7;">No file chosen</div>
            </div>

            <textarea id="inputText" placeholder="Or paste text content here..."></textarea>
            
            <div style="display:flex; justify-content:space-between; margin-top:15px; font-size: 12px; font-weight: 700;">
                <span>Flashcards:</span>
                <span id="rangeVal" style="color:var(--gold)">8</span>
            </div>
            <input type="range" id="qCount" min="1" max="15" value="8" style="width:100%; accent-color:var(--gold);" oninput="rangeVal.innerText = this.value">

            <button id="main-btn" onclick="generateAll()">GENERATE STUDY KIT</button>
            <div id="loader" class="loader">AI IS ANALYZING YOUR CONTENT...</div>
        </div>

        <div id="output" class="output-section">
            <h2 class="sec-header">1. Quick Summary</h2>
            <div class="card" id="sumList" style="line-height: 1.7; font-size: 14px;"></div>

            <h2 class="sec-header">2. Interactive Flashcards</h2>
            <div id="fcGrid" class="fc-grid"></div>

            <h2 class="sec-header">3. 80-Mark Exam Paper</h2>
            <div style="text-align: right; margin-bottom: 10px;">
                <button onclick="window.print()" style="padding: 8px 15px; border-radius: 8px; font-size: 11px; font-weight: 900; background: var(--gold); border: none; cursor: pointer;">🖨️ PRINT EXAM</button>
            </div>
            <div class="paper-content" id="paperList"></div>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR GEMINI API KEY
        const AI_KEY = "AIzaSyAVWEg7hmRXKSasfoKXiMsiLtn8J163X5A";

        function updateFileName() {
            const file = document.getElementById('fileInput').files[0];
            document.getElementById('fileName').innerText = file ? "Attached: " + file.name : "No file chosen";
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        async function generateAll() {
            const topic = document.getElementById('topic').value;
            const text = document.getElementById('inputText').value;
            const count = document.getElementById('qCount').value;
            const file = document.getElementById('fileInput').files[0];

            if(!topic) return alert("Please enter the Chapter Name!");
            if(!text && !file) return alert("Please upload a file or paste text!");

            document.getElementById('loader').style.display = "block";
            document.getElementById('main-btn').disabled = true;

            let prompt = `Act as an expert school teacher. Based on the provided material, create a study kit for the topic "${topic}". 
            REQUIRED OUTPUT:
            1. A comprehensive chapter summary.
            2. Exactly ${count} interactive flashcards (Question & Answer).
            3. A professional 80-mark exam paper: 14 MCQs (1m), 10 Short (2m), 10 Fill-ups (1m), 6 T/F (1m), and 4 Long (5m). 
            Use <b>bold</b> for headers and questions. 
            Format the response ONLY as a JSON object: {"summary": "html_string", "flashcards": [{"q":"text","a":"text"}], "paper": "html_string"}`;

            let parts = [{ text: prompt }];

            if (file) {
                const b64 = await toBase64(file);
                parts.push({
                    inline_data: {
                        mime_type: file.type,
                        data: b64.split(',')[1]
                    }
                });
            } else {
                parts.push({ text: "Text to analyze: " + text });
            }

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: parts }] })
                });

                const data = await res.json();
                const rawResponse = data.candidates[0].content.parts[0].text;
                const cleanJson = JSON.parse(rawResponse.replace(/```json|```/g, ""));

                document.getElementById('sumList').innerHTML = cleanJson.summary;
                document.getElementById('fcGrid').innerHTML = cleanJson.flashcards.map(fc => `
                    <div class="flashcard" onclick="this.classList.toggle('flipped')">
                        <div class="fc-inner">
                            <div class="fc-front">${fc.q}</div>
                            <div class="fc-back">${fc.a}</div>
                        </div>
                    </div>`).join('');
                document.getElementById('paperList').innerHTML = cleanJson.paper;

                document.getElementById('output').style.display = 'block';
                window.scrollTo({ top: document.getElementById('output').offsetTop - 20, behavior: 'smooth' });
            } catch (err) {
                console.error(err);
                alert("AI Error: Please check your API key or file size.");
            } finally {
                document.getElementById('loader').style.display = "none";
                document.getElementById('main-btn').disabled = false;
            }
        }
    </script>
</body>
</html>
