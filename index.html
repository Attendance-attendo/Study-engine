<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal AI Study Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #dc2626; --gold: #facc15; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 750px; }
        .card { background: var(--card); border-radius: 24px; padding: 2rem; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        input[type="text"] { width: 100%; padding: 15px; margin-top: 10px; border-radius: 12px; background: #0f172a; color: white; border: 1px solid #334155; }
        
        .upload-area { border: 3px dashed var(--gold); padding: 30px; text-align: center; border-radius: 20px; cursor: pointer; background: rgba(250, 204, 21, 0.05); transition: 0.3s; margin-top: 20px; }
        .upload-area:hover { background: rgba(250, 204, 21, 0.1); }
        
        button { background: var(--gold); color: black; border: none; padding: 18px; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: 900; text-transform: uppercase; font-size: 14px; }
        button:disabled { background: #334155; cursor: not-allowed; }

        .loader { display: none; text-align: center; margin-top: 20px; color: var(--gold); font-weight: 800; }
        .output-section { display: none; width: 100%; margin-top: 30px; }
        .paper-content { background: white; color: #1a1a1a; padding: 40px; border-radius: 12px; white-space: pre-wrap; line-height: 1.8; font-size: 15px; }
        
        @media print {
            .container, .card, button, .upload-area, h2 { display: none !important; }
            .paper-content { padding: 0; border: none; }
            body { background: white; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 30px;">
            <h1 style="color:var(--gold); margin:0; font-size: 2.5rem; font-weight: 900; letter-spacing: -2px;">UNIVERSAL AI ENGINE</h1>
            <p style="font-weight: 700; opacity: 0.6; font-size: 10px;">TEXT • PHOTO • WORD • PDF • TXT</p>
        </header>

        <div class="card">
            <label style="font-size: 12px; font-weight: 800; color: var(--gold);">SYLLABUS / CHAPTER NAME</label>
            <input type="text" id="topic" placeholder="e.g., Science Final Exam">
            
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div style="font-size: 24px; margin-bottom: 10px;">📁</div>
                <b style="color:var(--gold)">ATTACH ANY FILE OR PHOTO</b>
                <input type="file" id="fileInput" accept="image/*, .pdf, .txt, .doc, .docx" style="display:none" onchange="updateFileStatus()">
                <div id="fileStat" style="font-size:11px; margin-top:10px; opacity: 0.7;">Supports JPG, PNG, PDF, Word, and Text</div>
            </div>

            <button id="mainBtn" onclick="processUniversalFile()">GENERATE MASTER KIT</button>
            <div id="loader" class="loader">⚙️ AI IS READING YOUR FILE... PLEASE WAIT...</div>
        </div>

        <div id="output" class="output-section">
            <h2 style="color:var(--gold); border-left: 5px solid var(--gold); padding-left: 15px;">Full Summary</h2>
            <div class="card" id="sumOut"></div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 40px;">
                <h2 style="color:var(--gold); border-left: 5px solid var(--gold); padding-left: 15px;">80-Mark Question Paper</h2>
                <button onclick="window.print()" style="width: auto; padding: 10px 20px; font-size: 11px;">🖨️ PRINT PDF</button>
            </div>
            <div class="paper-content" id="paperOut"></div>
        </div>
    </div>

    <script>
        const AI_KEY = "AIzaSyAVWEg7hmRXKSasfoKXiMsiLtn8J163X5A";

        function updateFileStatus() {
            const file = document.getElementById('fileInput').files[0];
            if(file) document.getElementById('fileStat').innerText = "✅ ATTACHED: " + file.name;
        }

        async function processUniversalFile() {
            const file = document.getElementById('fileInput').files[0];
            const topic = document.getElementById('topic').value;
            
            if(!file || !topic) return alert("Please enter the name and attach a file!");

            document.getElementById('loader').style.display = "block";
            document.getElementById('mainBtn').disabled = true;

            const reader = new FileReader();
            
            // Special handling for Text/Plain files
            if (file.type === "text/plain") {
                reader.readAsText(file);
                reader.onload = async () => {
                    sendToAI({ text: reader.result }, topic);
                };
            } else {
                // Handling Images, PDFs, and Word docs as Binary
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    sendToAI({ 
                        inline_data: { mime_type: file.type || "application/octet-stream", data: base64Data } 
                    }, topic);
                };
            }
        }

        async function sendToAI(filePart, topic) {
            const prompt = `Act as an expert teacher. Analyze this file regarding "${topic}".
            1. Provide a comprehensive summary.
            2. Create an 80-mark Exam Paper: 14 MCQs, 10 Short (2m), 10 Fill-ups, 6 T/F, 4 Long (5m).
            Return ONLY as JSON: {"summary": "html_string", "paper": "html_string"}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${AI_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, filePart] }]
                    })
                });

                const data = await response.json();
                const result = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));

                document.getElementById('sumOut').innerHTML = result.summary;
                document.getElementById('paperOut').innerHTML = result.paper;
                document.getElementById('output').style.display = "block";
            } catch (e) {
                alert("Error: AI could not process this specific file format or size.");
            } finally {
                document.getElementById('loader').style.display = "none";
                document.getElementById('mainBtn').disabled = false;
            }
        }
    </script>
</body>
</html>
